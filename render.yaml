services:
  # 1. Flask ML Microservice
  - type: web
    name: nutri-diet-ml
    env: python
    rootDir: ml
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py
    plan: free

  # 2. Spring Boot Java Backend
  - type: web
    name: nutri-diet-backend
    env: image
    rootDir: backend
    # Since Render supports Docker, using a simple multi-stage Docker build is 100% reliable for Spring Boot JDK 21+
    # We will write a lightweight Dockerfile in the backend folder to guarantee it builds successfully on Render!
    plan: free
